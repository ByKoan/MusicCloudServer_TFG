<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ current_song }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>

<!-- Contenedor de botones fijos arriba -->
<div class="top-buttons">
    {% if session['user_id'] and session.get('role') == 'admin' %}
        <button class="menu" onclick="window.location.href='{{ url_for('admin.admin_panel') }}'">
            Panel de Admin
        </button>
    {% endif %}
    <button class="logout" onclick="window.location.href='/logout'">Cerrar sesión</button>
</div>

<h1>Bienvenido, {{ session['user_id'] }}</h1>
<h2>Canción actual: <span id="currentSongTitle">{{ current_song }}</span></h2>

<form id="searchForm" action="/" method="get" class="search-form">
    <input type="text" id="searchInput" name="search" placeholder="Buscar canciones..." value="{{ request.args.get('search', '') }}">
    <button type="submit">Buscar</button>
    <button type="button" id="resetSearch" class="btn">Reiniciar</button>
</form>

<audio id="player" controls autoplay>
    <source id="audioSource" src="" type="audio/mpeg">
</audio>

<br>
<div class="playback-controls">
    <button onclick="handlePreviousClick()">Anterior</button>
    <button onclick="playPause()">Reproducir/Pausa</button>
    <button onclick="handleNextClick()">Siguiente</button>
</div>

<br>
<div class="mode-controls">

    <div class="toggle-container" onclick="toggleShuffleUI()">
        <span>Modo Aleatorio</span>
        <div id="shuffleToggle" class="toggle-switch">
            <div class="toggle-knob"></div>
        </div>
    </div>

    <div class="toggle-container" onclick="toggleLoopUI()">
        <span>Modo Bucle</span>
        <div id="loopToggle" class="toggle-switch">
            <div class="toggle-knob"></div>
        </div>
    </div>

</div>

<br>
<div class="action-buttons">
    <a href="{{ url_for('upload.upload_file') }}" class="btn">Subir nuevas canciones</a>
    <a href="/playlists" class="btn">Playlists</a>
    <a href="{{ url_for('youtube.youtube_page') }}" class="btn">Buscar en YouTube</a>
</div>

<ul id="songList">
{% for song in songs %}
    <li class="song-item" data-filename="{{ song }}">
        <span class="song-title" onclick="loadSong({{ loop.index0 }})">{{ song }}</span>
        <div class="song-actions">
            <!-- Botón Borrar -->
            <button class="delete-song-btn" data-filename="{{ song }}">Borrar</button>

            <!-- Botón Añadir a Playlist -->
            <div class="add-to-playlist">
                <button class="add-btn">+</button>
                <select class="playlist-select" style="display:none;">
                    <option value="" selected disabled>Seleccionar playlist</option>
                    {% for playlist in playlists %}
                        <option value="{{ playlist.id }}">{{ playlist.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </li>
{% endfor %}
</ul>

<script>
window.songs = {{ songs | tojson }};
window.currentSongIndex = 0;

if (window.songs.length > 0 && "{{ current_song }}" !== "") {
    const idx = window.songs.findIndex(s => s === "{{ current_song }}");
    if (idx !== -1) window.currentSongIndex = idx;
}
</script>

<script src="{{ url_for('static', filename='player.js') }}"></script>

</body>
</html>
